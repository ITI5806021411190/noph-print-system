<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบข้อมูลบุคลากร สสจ.นย.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script>
    // ==========================================
    // 🔗 ตั้งค่า API URL ตรงนี้! (นำลิงก์ Web App อันเดิมมาใส่)
    // ==========================================
    const GAS_API_URL = "ใส่_WEB_APP_URL_ของคุณที่นี่";
    
    let allGroups = [];

    async function fetchAPI(action, data = {}) {
      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: action, data: data }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow'
        });
        
        if (!response.ok) throw new Error(`การเชื่อมต่อมีปัญหา (HTTP Status: ${response.status})`);
        
        const textData = await response.text();
        try {
          return JSON.parse(textData);
        } catch (parseErr) {
          throw new Error("ข้อมูลที่ได้รับผิดรูปแบบ กรุณาตรวจสอบการตั้งค่า Deploy ของ Google Sheet");
        }
      } catch (err) {
        throw new Error(err.message);
      }
    }

    function showLoading(txt) { 
      Swal.fire({ title: txt, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
    }

    async function checkPrinterCode() {
      const pinInput = document.getElementById('searchPin').value.trim();
      if(!pinInput || pinInput.length < 5) {
        return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสเครื่องปริ้นที่ถูกต้อง', 'warning');
      }

      showLoading("กำลังค้นหาข้อมูลของคุณ...");
      try {
        const res = await fetchAPI('getStaffByPrinterCode', { printerCode: pinInput });
        Swal.close();

        if(res.success) {
          allGroups = res.groups;
          document.getElementById('searchSection').classList.add('hidden');
          document.getElementById('editSection').classList.remove('hidden');
          
          // นำข้อมูลที่ค้นเจอมาใส่ในฟอร์ม
          document.getElementById('formPrinterCode').value = res.data.printerCode;
          document.getElementById('formName').value = res.data.name;
          document.getElementById('formPosition').value = res.data.position || '';
          
          const selGroup = document.getElementById('formGroup');
          selGroup.innerHTML = '';
          allGroups.forEach(function(g) {
            let selected = (g.name === res.data.groupName || g.code === res.data.groupCode) ? 'selected' : '';
            selGroup.innerHTML += `<option value="${g.code}|${g.name}" ${selected}>${g.code} - ${g.name}</option>`;
          });
        } else {
          Swal.fire('ไม่พบข้อมูล', res.message, 'error');
        }
      } catch(e) {
        Swal.close();
        Swal.fire('ข้อผิดพลาด', e.message, 'error');
      }
    }

    async function submitUpdate() {
      const groupData = document.getElementById('formGroup').value.split('|');
      
      const payload = {
        printerCode: document.getElementById('formPrinterCode').value,
        name: document.getElementById('formName').value.trim(),
        position: document.getElementById('formPosition').value.trim(),
        groupCode: groupData[0],
        groupName: groupData[1]
      };

      if(!payload.name) return Swal.fire('แจ้งเตือน', 'กรุณากรอกชื่อ-สกุล', 'warning');

      showLoading("กำลังบันทึกข้อมูล...");
      try {
        const res = await fetchAPI('updateStaffData', payload);
        if(res.success) {
          Swal.fire({
            icon: 'success',
            title: 'บันทึกสำเร็จ!',
            text: res.message,
            confirmButtonText: 'กลับไปหน้าเข้าสู่ระบบ'
          }).then(() => {
            window.location.href = 'index.html'; // กลับไปหน้าหลัก
          });
        } else {
          Swal.fire('ข้อผิดพลาด', res.message, 'error');
        }
      } catch(e) {
        Swal.fire('ข้อผิดพลาด', e.message, 'error');
      }
    }
  </script>

  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .swal2-title, .swal2-content, .swal2-html-container { font-family: 'Prompt', sans-serif !important; }
  </style>
</head>
<body class="text-gray-800 p-4">

  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 relative">
    <div class="text-center mb-8">
      <i class="fas fa-user-check text-5xl text-blue-600 mb-4"></i>
      <h2 class="text-2xl font-bold text-gray-800">ระบบตรวจสอบรายชื่อบุคลากร</h2>
      <p class="text-sm text-gray-500 mt-2">เชื่อมโยงข้อมูลรหัสจากเครื่องปริ้นเข้าสู่ระบบส่วนกลาง</p>
    </div>

    <div id="searchSection" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1 text-gray-700">รหัสในเครื่องปริ้นของคุณ (PIN)</label>
        <input type="text" id="searchPin" class="w-full border-2 border-blue-200 rounded-lg p-3 text-center text-xl font-bold tracking-widest focus:border-blue-500 focus:outline-none" placeholder="กรอกเลข 6 หลัก">
      </div>
      <button onclick="checkPrinterCode()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md transition duration-200">
        <i class="fas fa-search mr-2"></i> ค้นหาข้อมูลของฉัน
      </button>
      <div class="text-center mt-4">
        <a href="index.html" class="text-gray-500 text-sm hover:underline"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
      </div>
    </div>

    <div id="editSection" class="hidden space-y-4 fade-in">
      <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
        <p class="text-sm text-yellow-700"><strong><i class="fas fa-info-circle"></i> โปรดตรวจสอบข้อมูล:</strong> หากข้อมูลด้านล่างไม่ถูกต้อง คุณสามารถแก้ไขให้เป็นปัจจุบันได้ทันที</p>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase">รหัสเครื่องปริ้นของคุณ</label>
        <input type="text" id="formPrinterCode" class="w-full border-b-2 border-gray-300 py-2 text-lg font-bold text-gray-600 bg-transparent outline-none" readonly>
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">ชื่อ-สกุล (คำนำหน้าด้วย)</label>
        <input type="text" id="formName" class="w-full border rounded-lg p-3 focus:ring focus:ring-blue-200 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">ตำแหน่ง</label>
        <input type="text" id="formPosition" class="w-full border rounded-lg p-3 focus:ring focus:ring-blue-200 outline-none" placeholder="เช่น นักวิชาการคอมพิวเตอร์">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">กลุ่มงานปัจจุบัน</label>
        <select id="formGroup" class="w-full border rounded-lg p-3 focus:ring focus:ring-blue-200 outline-none"></select>
      </div>

      <div class="pt-4 flex space-x-3">
        <button onclick="location.reload()" class="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-300 transition duration-200">
          ยกเลิก
        </button>
        <button onclick="submitUpdate()" class="w-2/3 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 shadow-md transition duration-200">
          <i class="fas fa-save mr-2"></i> ยืนยันและบันทึก
        </button>
      </div>
    </div>

  </div>

</body>
</html>
